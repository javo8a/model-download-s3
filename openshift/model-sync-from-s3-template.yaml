apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: model-sync-from-s3
  annotations:
    openshift.io/display-name: Sync model weights from S3 into a PVC
    description: >-
      Batch Job using the KServe storage initializer image (same idea as
      https://github.com/opendatahub-io/kserve/blob/odh-v3.3/docs/samples/storage/pvc-init/job.yaml ).
      Downloads an S3 prefix into an existing PVC.

      Prerequisites:
      - PVC already exists (claimName below).
      - Secret with AWS-style credentials for S3 (keys AWS_ACCESS_KEY_ID,
        AWS_SECRET_ACCESS_KEY; optionally AWS_DEFAULT_REGION). Endpoint-related
        keys can live in the secret or in template parameters below; explicit env
        from this Job overrides duplicate keys from envFrom.

      Resources: only memory request/limit are parameterized; CPU is left unset so
      the cluster applies its defaults (add cpu under resources in the Job if you
      need explicit CPU requests or limits).

      Apply processed manifests:
        oc process -f openshift/model-sync-from-s3-template.yaml \
          --param-file=openshift/sample.env | oc apply -f -

      Rendered YAML uses minimal quoting (e.g. s3:// URIs often appear unquoted);
      that is valid and equivalent to quoted scalars. Use -o json | oc apply -f -
      if you prefer JSON output.

      Or substitute from your shell:
        set -a && source openshift/sample.env && set +a
        oc process -f openshift/model-sync-from-s3-template.yaml \
          -p JOB_NAME="$JOB_NAME" \
          ... | oc apply -f -
objects:
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: "${JOB_NAME}"
      labels:
        app.kubernetes.io/name: model-storage-sync
        app.kubernetes.io/component: pvc-init
    spec:
      parallelism: 1
      completions: 1
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: model-storage-sync
            app.kubernetes.io/component: pvc-init
        spec:
          serviceAccountName: "${SERVICE_ACCOUNT_NAME}"
          restartPolicy: Never
          volumes:
            - name: pvc
              persistentVolumeClaim:
                claimName: "${PVC_CLAIM_NAME}"
                readOnly: false
          containers:
            - name: storage-initializer
              image: "${STORAGE_INITIALIZER_IMAGE}"
              imagePullPolicy: IfNotPresent
              args:
                - "${S3_URI}"
                - "${MOUNT_PATH}"
              envFrom:
                - secretRef:
                    name: "${S3_CREDENTIALS_SECRET}"
              env:
                - name: HF_HUB_DISABLE_TELEMETRY
                  value: "${HF_HUB_DISABLE_TELEMETRY}"
                - name: S3_USE_HTTPS
                  value: "${S3_USE_HTTPS}"
                - name: S3_ENDPOINT
                  value: "${S3_ENDPOINT}"
                - name: AWS_ENDPOINT_URL
                  value: "${AWS_ENDPOINT_URL}"
                - name: S3_VERIFY_SSL
                  value: "${S3_VERIFY_SSL}"
              resources:
                requests:
                  memory: "${MEMORY_REQUEST}"
                limits:
                  memory: "${MEMORY_LIMIT}"
              volumeMounts:
                - name: pvc
                  mountPath: "${MOUNT_PATH}"
                  readOnly: false
parameters:
  - name: JOB_NAME
    description: Kubernetes Job name (must be DNS-1123 compliant)
    required: true
  - name: PVC_CLAIM_NAME
    description: Existing PersistentVolumeClaim to populate with model files
    required: true
  - name: S3_URI
    description: >-
      Source URI for the storage initializer, e.g. s3://my-bucket/path/to/model/
    required: true
  - name: MOUNT_PATH
    description: Path inside the container / PVC where weights are written
    value: "/mnt/models"
  - name: SERVICE_ACCOUNT_NAME
    description: ServiceAccount for the Job pod (needs permission to use the PVC)
    required: true
  - name: STORAGE_INITIALIZER_IMAGE
    description: KServe / ODH storage initializer image
    value: "quay.io/opendatahub/kserve-storage-initializer:v0.15-latest"
  - name: S3_CREDENTIALS_SECRET
    description: >-
      Secret in the same namespace containing AWS_ACCESS_KEY_ID and
      AWS_SECRET_ACCESS_KEY (and optional AWS_DEFAULT_REGION). Same-named keys
      in explicit env below override values from this secret.
    required: true
  - name: S3_USE_HTTPS
    description: >-
      Whether to use HTTPS for S3-compatible endpoints (e.g. 1/true). Leave empty
      for default SDK behavior when using public AWS S3.
    value: ""
  - name: S3_ENDPOINT
    description: >-
      S3 API endpoint host (no scheme), for MinIO / on-cluster S3. Leave empty
      for public AWS S3.
    value: ""
  - name: AWS_ENDPOINT_URL
    description: >-
      Full endpoint URL with scheme (e.g. https://minio.example:9000). Leave empty
      for public AWS S3. This env entry overrides envFrom: duplicate the secret's
      URL here if you also store AWS_ENDPOINT_URL in the credentials secret.
    value: ""
  - name: S3_VERIFY_SSL
    description: >-
      TLS certificate verification (e.g. 1/true or 0/false). Leave empty for default
      SDK behavior.
    value: ""
  - name: HF_HUB_DISABLE_TELEMETRY
    description: Passed through for parity with HF-style jobs; harmless for pure S3
    value: "1"
  - name: MEMORY_REQUEST
    description: >-
      Pod memory request; omit from --param-file and rely on template default, or
      override with oc process -p MEMORY_REQUEST=...
    value: "20Gi"
  - name: MEMORY_LIMIT
    description: >-
      Pod memory limit; omit from --param-file for default, or override with
      oc process -p MEMORY_LIMIT=...
    value: "100Gi"
